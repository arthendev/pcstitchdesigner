<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Frame -->
  <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Pattern dots (representing stitch points) -->
  <circle cx="10" cy="10" r="1.5" fill="#1a73e8"/>
  <circle cx="12" cy="9" r="1.5" fill="#1a73e8"/>
  <circle cx="14" cy="10" r="1.5" fill="#1a73e8"/>
  <circle cx="13" cy="12" r="1.5" fill="#1a73e8"/>
  <circle cx="11" cy="12" r="1.5" fill="#1a73e8"/>
  <circle cx="12" cy="14" r="1.5" fill="#1a73e8"/>
  <!-- Arrows pointing inward from corners -->
  <polyline points="5,5 7,7" fill="none" stroke="#1a73e8" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="7,5 5,7" fill="none" stroke="#1a73e8" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="19,5 17,7" fill="none" stroke="#1a73e8" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="17,5 19,7" fill="none" stroke="#1a73e8" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="5,19 7,17" fill="none" stroke="#1a73e8" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="7,19 5,17" fill="none" stroke="#1a73e8" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="19,19 17,17" fill="none" stroke="#1a73e8" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="17,19 19,17" fill="none" stroke="#1a73e8" stroke-width="1.5" stroke-linecap="round"/>
</svg>