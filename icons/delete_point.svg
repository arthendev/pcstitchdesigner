<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Paper surface -->
  <line x1="2" y1="20" x2="18" y2="20" stroke="#000" stroke-width="0.8" stroke-linecap="round"/>
  
  <!-- Eraser rotated 45 degrees, red-blue design with cut bottom corner -->
  <!-- Group rotated 45 degrees around center -->
  <g transform="rotate(45 12 12)">
    <!-- Red half (top) - full rectangle -->
    <rect x="8" y="3" width="8" height="9" fill="#4444ff" stroke="#333" stroke-width="1"/>
    
    <!-- Blue half (bottom) - polygon with cut bottom-right corner -->
    <polygon points="8,12 16,12 16,18 13,21 8,21" 
             fill="#ff4444" stroke="#333" stroke-width="1" stroke-linejoin="round"/>
  </g>
</svg>
