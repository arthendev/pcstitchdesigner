<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Vertical line -->
  <line x1="12" y1="2" x2="12" y2="22" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Horizontal line -->
  <line x1="2" y1="12" x2="22" y2="12" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Top arrow -->
