<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Frame -->
  <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Four corner arrows -->
  <!-- Top-left -->
  <polyline points="10,6 6,6 6,10" fill="none" stroke="#1a73e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Top-right -->
  <polyline points="14,6 18,6 18,10" fill="none" stroke="#1a73e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-left -->
  <polyline points="6,14 6,18 10,18" fill="none" stroke="#1a73e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-right -->
  <polyline points="18,14 18,18 14,18" fill="none" stroke="#1a73e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
